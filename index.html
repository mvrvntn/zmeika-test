<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake v3.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0e14;
      color: #e0e0e0;
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* Canvas */
    #game-canvas {
      border: 1px solid #1a2a1a;
      border-radius: 4px;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
      touch-action: none;
    }

    /* Menu container fills the same space as canvas */
    #menu-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #menu-container:empty {
      display: none;
    }

    .canvas-wrapper {
      position: relative;
    }

    /* Menu Styles */
    .menu-wrapper {
      background: #0f151e;
      border: 1px solid #1a2a1a;
      border-radius: 12px;
      padding: 24px 28px;
      min-width: 360px;
      max-width: 420px;
      animation: fadeIn 300ms ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .menu-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 4px;
      text-align: center;
      color: #00ff41;
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
      margin-bottom: 20px;
    }

    .gameover-title {
      font-size: 32px;
      color: #ff0040;
      text-shadow: 0 0 15px rgba(255, 0, 64, 0.4);
    }

    .gameover-score {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 48px;
      text-align: center;
      color: #e0e0e0;
      margin-bottom: 12px;
    }

    .gameover-stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: #808080;
    }

    .menu-section {
      margin-bottom: 16px;
    }

    .menu-section h3 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      color: #808080;
      margin-bottom: 8px;
    }

    .menu-options {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .menu-options-row {
      flex-direction: row;
      gap: 8px;
    }

    .menu-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 200ms ease-out;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
    }

    .menu-option:hover {
      background: rgba(0, 255, 65, 0.05);
      border-color: rgba(0, 255, 65, 0.2);
    }

    .menu-option.active {
      border-color: #00ff41;
      background: rgba(0, 255, 65, 0.08);
    }

    .menu-option-sm {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 200ms ease-out;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .menu-option-sm:hover {
      background: rgba(0, 255, 65, 0.05);
    }

    .menu-option-sm.active {
      border-color: #00ff41;
      background: rgba(0, 255, 65, 0.08);
    }

    .radio {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #808080;
      flex-shrink: 0;
      transition: all 200ms;
    }

    .radio-active {
      border-color: #00ff41;
      background: #00ff41;
      box-shadow: 0 0 6px rgba(0, 255, 65, 0.5);
    }

    .radio-sm {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #808080;
      flex-shrink: 0;
      transition: all 200ms;
    }

    .radio-sm.radio-active {
      border-color: #00ff41;
      background: #00ff41;
    }

    .option-label {
      flex: 1;
    }

    .option-hint {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #808080;
    }

    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }

    .btn-cta {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      padding: 12px 24px;
      border-radius: 8px;
      border: 1px solid #00ff41;
      background: rgba(0, 255, 65, 0.1);
      color: #00ff41;
      cursor: pointer;
      transition: all 200ms ease-out;
    }

    .btn-cta:hover {
      background: rgba(0, 255, 65, 0.2);
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
    }

    .btn-cta:active {
      transform: scale(0.97);
    }

    .btn-secondary {
      font-family: 'Orbitron', sans-serif;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 1.5px;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #1a2a1a;
      background: transparent;
      color: #808080;
      cursor: pointer;
      transition: all 200ms ease-out;
    }

    .btn-secondary:hover {
      background: rgba(0, 255, 65, 0.05);
      color: #00ff41;
      border-color: #00ff41;
    }

    /* Skin grid */
    .skin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .skin-card {
      background: #0f151e;
      border: 1px solid #1a2a1a;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 200ms ease-out;
      position: relative;
      min-height: 100px;
    }

    .skin-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
    }

    .skin-card-active {
      border-color: #00ff41;
      box-shadow: 0 0 12px rgba(0, 255, 65, 0.3);
    }

    .skin-preview {
      display: flex;
      align-items: center;
      gap: 3px;
      min-height: 20px;
    }

    .skin-segment {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    .skin-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 500;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: #808080;
    }

    .skin-check {
      position: absolute;
      top: 6px;
      right: 8px;
      color: #00ff41;
      font-size: 16px;
      font-weight: bold;
    }

    /* Achievements */
    .achievements-list {
      max-height: 360px;
      overflow-y: auto;
      margin: 12px 0;
    }

    .achievement-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(0, 255, 65, 0.1);
    }

    .achievement-icon {
      font-size: 20px;
      width: 28px;
      text-align: center;
    }

    .achievement-info {
      flex: 1;
    }

    .achievement-title {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
    }

    .achievement-desc {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #808080;
      margin-top: 2px;
    }

    .achievement-unlocked .achievement-title {
      color: #e0e0e0;
    }

    .achievement-locked .achievement-title,
    .achievement-locked .achievement-desc {
      opacity: 0.5;
    }

    .achievement-status {
      font-size: 16px;
    }

    .progress-text {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 14px;
      color: #808080;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #0f151e;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar-fill {
      height: 100%;
      background: #00ff41;
      border-radius: 4px;
      transition: width 500ms ease-out;
      box-shadow: 0 0 4px rgba(0, 255, 65, 0.5);
    }

    /* Pause overlay */
    .pause-overlay {
      background: rgba(0, 0, 0, 0.7);
      padding: 32px;
      border-radius: 12px;
      border: 1px solid #1a2a1a;
      text-align: center;
      animation: fadeIn 200ms ease-out;
    }

    .pause-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 4px;
      color: #00ff41;
      margin-bottom: 20px;
    }

    .pause-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .menu-wrapper {
        min-width: unset;
        width: 95vw;
        padding: 16px;
      }
      .skin-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .menu-title {
        font-size: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="canvas-wrapper" style="position:relative;">
      <canvas id="game-canvas"></canvas>
      <div id="menu-container"></div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "./js/config.js": "./js/config.js",
      "./js/snake.js": "./js/snake.js",
      "./js/food.js": "./js/food.js",
      "./js/skins.js": "./js/skins.js",
      "./js/audio.js": "./js/audio.js",
      "./js/input.js": "./js/input.js",
      "./js/bot.js": "./js/bot.js",
      "./js/achievements.js": "./js/achievements.js",
      "./js/renderer.js": "./js/renderer.js",
      "./js/menu.js": "./js/menu.js",
      "./js/game.js": "./js/game.js"
    }
  }
  </script>

  <script type="module">
    import { Game } from './js/game.js';

    const canvas = document.getElementById('game-canvas');
    const menuContainer = document.getElementById('menu-container');

    const game = new Game(canvas, menuContainer);
    game.start();
  </script>
</body>
</html>
