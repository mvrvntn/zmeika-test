<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Snake v3.0 — Epic Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e14;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Orbitron',system-ui,monospace;overflow:hidden;-webkit-user-select:none;user-select:none}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,0.4),transparent),radial-gradient(1px 1px at 25% 55%,rgba(255,255,255,0.3),transparent),radial-gradient(1.5px 1.5px at 50% 10%,rgba(255,255,255,0.5),transparent),radial-gradient(1px 1px at 70% 80%,rgba(255,255,255,0.3),transparent),radial-gradient(1px 1px at 85% 35%,rgba(255,255,255,0.4),transparent),radial-gradient(1.5px 1.5px at 15% 90%,rgba(255,255,255,0.35),transparent),radial-gradient(1px 1px at 40% 40%,rgba(255,255,255,0.25),transparent),radial-gradient(1px 1px at 90% 60%,rgba(255,255,255,0.3),transparent),radial-gradient(1.5px 1.5px at 5% 45%,rgba(100,200,255,0.4),transparent),radial-gradient(1px 1px at 60% 65%,rgba(255,200,100,0.3),transparent),radial-gradient(1px 1px at 30% 5%,rgba(100,255,200,0.2),transparent),radial-gradient(1.5px 1.5px at 75% 25%,rgba(200,100,255,0.3),transparent);pointer-events:none;z-index:0;animation:twinkle 4s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:0.6}100%{opacity:1}}
.game-wrapper{position:relative;z-index:1;background:#0d1117;padding:20px;border-radius:10px;box-shadow:0 0 60px rgba(0,255,65,0.15);border:1px solid rgba(0,255,65,0.15);max-width:480px;margin:10px}
.header{display:flex;justify-content:space-between;align-items:center;padding:0 2px 10px 2px}
.header-left{display:flex;align-items:center;gap:10px}
h1{font-size:13px;letter-spacing:5px;color:#00ff41;text-shadow:0 0 15px rgba(0,255,65,0.6);font-family:'Orbitron',monospace}
.control-btn{background:none;border:1px solid rgba(0,255,65,0.25);color:rgba(0,255,65,0.5);font-size:13px;border-radius:4px;padding:2px 6px;cursor:pointer;transition:0.2s;line-height:1;font-family:'Orbitron',monospace}
.control-btn:hover{border-color:#00ff41;color:#00ff41}
.control-btn.muted{opacity:0.35}
.mode-badge{font-size:9px;color:rgba(0,255,65,0.4);font-family:'Orbitron',monospace;letter-spacing:1px}
.canvas-wrap{position:relative;border-radius:5px;box-shadow:0 0 12px rgba(0,255,65,0.2)}
canvas{display:block;width:100%;height:auto;aspect-ratio:1/1;max-width:400px;margin:0 auto;border-radius:4px;background:#0d1117;position:relative;z-index:1;touch-action:none}
.canvas-wrap::before{content:'';position:absolute;inset:-2px;border-radius:6px;background:conic-gradient(#00ff41,#00d4ff,#00ff41,#00ff88,#00ff41);z-index:0;animation:neonBorder 3s linear infinite;opacity:0.5}
.canvas-wrap::after{content:'';position:absolute;inset:-2px;border-radius:6px;background:conic-gradient(#ff0040,#ff6600,#ff0040,#ff0088,#ff0040);z-index:0;animation:neonBorder 3s linear infinite reverse;opacity:0.2}
@keyframes neonBorder{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.dpad{display:none;justify-content:center;gap:5px;margin-top:8px}
.dpad.visible{display:flex}
.dpad-col{display:flex;flex-direction:column;align-items:center;gap:5px}
.dpad-btn{width:48px;height:48px;border-radius:6px;border:2px solid rgba(0,255,65,0.35);background:rgba(0,255,65,0.06);color:#00ff41;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.1s;touch-action:manipulation}
.dpad-btn:active{background:rgba(0,255,65,0.2);border-color:#00ff41;transform:scale(0.92)}
/* Menu buttons */
.snake-menu-btn:hover{box-shadow:0 0 20px rgba(0,255,65,0.25)!important}
@media(max-width:460px){
.game-wrapper{padding:10px}
h1{font-size:11px}
.dpad.visible{display:flex}
.control-btn{font-size:11px}
}
</style>
</head>
<body>
<div class="game-wrapper">
<div class="header">
<div class="header-left">
<h1>▶ SNAKE v3</h1>
<button class="control-btn" id="skinBtn" title="Skin Select">🎨</button>
<button class="control-btn" id="achBtn" title="Achievements">🏆</button>
</div>
<div>
<button class="control-btn" id="soundBtn" title="Sound 🎵">🔊</button>
</div>
</div>
<div class="canvas-wrap">
<canvas id="gameCanvas" width="400" height="400"></canvas>
</div>
<div class="dpad" id="dpad">
<div class="dpad-col">
<div class="dpad-btn" data-dir="up">↑</div>
<div style="display:flex;gap:4px">
<div class="dpad-btn" data-dir="left">←</div>
<div class="dpad-btn" data-dir="down">↓</div>
<div class="dpad-btn" data-dir="right">→</div>
</div>
</div>
</div>
</div>
<script type="importmap">
{
"imports": {
"config": "./js/config.js",
"snake": "./js/snake.js",
"food": "./js/food.js",
"audio": "./js/audio.js",
"achievements": "./js/achievements.js",
"input": "./js/input.js",
"bot": "./js/bot.js",
"renderer": "./js/renderer.js",
"menu": "./js/menu.js",
"skins": "./js/skins.js"
}
}
</script>
<script type="module">
import { CONFIG } from 'config';
import { Game } from './js/game.js';

const canvas = document.getElementById('gameCanvas');
const soundBtn = document.getElementById('soundBtn');
const skinBtn = document.getElementById('skinBtn');
const achBtn = document.getElementById('achBtn');
const dpad = document.getElementById('dpad');

if ('ontouchstart' in window) dpad.classList.add('visible');

const game = new Game(canvas);

soundBtn.addEventListener('click', () => {
game.audio.toggle();
soundBtn.textContent = game.audio.enabled ? '🔊' : '🔇';
soundBtn.classList.toggle('muted', !game.audio.enabled);
});

skinBtn.addEventListener('click', () => {
if (game.state === 3 || game.state === 5 || game.state === 6) return;
game.showSkinSelect();
});

achBtn.addEventListener('click', () => {
game.state = 7;
game.renderer.clear(CONFIG.currentSkin);
const progress = game.achievements.getProgress();
game.menu.showAchievements(progress);
});
</script>
</body>
</html>
