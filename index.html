<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Змейка — Snake Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e14;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; font-family: 'Orbitron', system-ui, monospace;
      overflow: hidden;
    }
    /* Stars background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1.5px 1.5px at 15% 90%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1px 1px at 40% 40%, rgba(255,255,255,0.25), transparent),
        radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1.5px 1.5px at 5% 45%, rgba(100,200,255,0.4), transparent),
        radial-gradient(1px 1px at 60% 65%, rgba(255,200,100,0.3), transparent),
        radial-gradient(1px 1px at 30% 5%, rgba(100,255,200,0.2), transparent),
        radial-gradient(1.5px 1.5px at 75% 25%, rgba(200,100,255,0.3), transparent);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    .game-wrapper {
      position: relative; z-index: 1;
      background: #0d1117;
      padding: 30px; border-radius: 12px;
      box-shadow:
        0 0 60px rgba(0,255,65,0.2),
        0 0 120px rgba(0,255,65,0.08),
        inset 0 0 60px rgba(0,255,65,0.03);
      border: 1px solid rgba(0,255,65,0.2);
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 4px 16px 4px;
    }
    h1 {
      font-size: 16px; letter-spacing: 8px; text-transform: uppercase;
      color: #00ff41; text-shadow: 0 0 20px rgba(0,255,65,0.8), 0 0 40px rgba(0,255,65,0.3);
      font-family: 'Orbitron', 'Courier New', monospace;
    }
    .score {
      font-size: 18px; color: #00ff41; font-family: 'Orbitron', 'Courier New', monospace;
      text-shadow: 0 0 10px rgba(0,255,65,0.4);
      transition: transform 0.2s ease;
    }
    .score span {
      color: #00d4ff;
      text-shadow: 0 0 15px rgba(0,212,255,0.6);
      display: inline-block;
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .score span.bump { transform: scale(1.5); }
    .canvas-wrap {
      position: relative;
      border-radius: 6px;
      box-shadow: 0 0 15px rgba(0,255,65,0.3), 0 0 45px rgba(0,255,65,0.1);
    }
    canvas {
      display: block; width: 400px; height: 400px;
      border-radius: 4px; background: #0d1117;
      position: relative; z-index: 1;
    }
    /* Neon border animation */
    .canvas-wrap::before {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 7px;
      background: conic-gradient(#00ff41, #00d4ff, #00ff41, #00ff88, #00ff41);
      z-index: 0;
      animation: neonBorder 3s linear infinite;
      opacity: 0.6;
    }
    .canvas-wrap::after {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 7px;
      background: conic-gradient(#ff0040, #ff6600, #ff0040, #ff0088, #ff0040);
      z-index: 0;
      animation: neonBorder 3s linear infinite reverse;
      opacity: 0.3;
    }
    @keyframes neonBorder {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .controls {
      display: flex; justify-content: center; gap: 8px; padding-top: 14px;
    }
    .controls .hint {
      font-size: 10px; color: rgba(0,255,65,0.35); letter-spacing: 3px;
      font-family: 'Orbitron', 'Courier New', monospace;
    }
    @keyframes glitch {
      0% { transform: translate(0); filter: hue-rotate(0deg); }
      10% { transform: translate(-4px, 2px); filter: hue-rotate(90deg); }
      20% { transform: translate(4px, -2px); filter: hue-rotate(180deg); }
      30% { transform: translate(-2px, 1px); filter: hue-rotate(270deg); }
      40% { transform: translate(2px, -1px); filter: hue-rotate(360deg); }
      50% { transform: translate(0); filter: hue-rotate(0deg); }
      100% { transform: translate(0); filter: hue-rotate(0deg); }
    }
    .glitch { animation: glitch 0.6s ease-in-out; }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <h1>▶ SNAKE</h1>
    <div class="score">🍎 <span id="scoreDisplay">0</span></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
  </div>
  <div class="controls">
    <span class="hint">← ↑ → ↓</span>
  </div>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');

  const GRID = 20;
  const COLS = 20;
  const ROWS = 20;
  const TICK_MS = 150;

  const GameState = { MENU: 0, PLAYING: 1, GAME_OVER: 2 };
  let state = GameState.MENU;
  let score = 0;
  let snake, apple, direction, nextDirection, gameLoop;
  let stars = Array.from({length: 50}, () => ({x: Math.random()*400, y: Math.random()*400, size: Math.random()*1.5+0.5, speed: Math.random()*0.3+0.1}));
  let scoreBumpTimeout;

  class Snake {
    constructor() {
      this.segments = [
        { x: 9, y: 10 },
        { x: 8, y: 10 },
        { x: 7, y: 10 }
      ];
      this.growPending = false;
    }
    head() { return this.segments[0]; }
    move(dir) {
      const head = { x: this.head().x + dir.x, y: this.head().y + dir.y };
      if (this.growPending) {
        this.segments.unshift(head);
        this.growPending = false;
      } else {
        this.segments.unshift(head);
        this.segments.pop();
      }
      return head;
    }
    grow() { this.growPending = true; }
    collidesWith(pos) {
      return this.segments.some(s => s.x === pos.x && s.y === pos.y);
    }
    collidesWall(pos) {
      return pos.x < 0 || pos.x >= COLS || pos.y < 0 || pos.y >= ROWS;
    }
    collidesSelf() {
      const head = this.head();
      return this.segments.slice(1).some(s => s.x === head.x && s.y === head.y);
    }
    reset() {
      this.segments = [
        { x: 9, y: 10 },
        { x: 8, y: 10 },
        { x: 7, y: 10 }
      ];
      this.growPending = false;
    }
  }

  class Apple {
    constructor() { this.position = { x: 15, y: 10 }; }
    respawn(snake) {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.collidesWith(pos));
      this.position = pos;
    }
  }

  const DIR = {
    UP:    { x: 0, y: -1 },
    DOWN:  { x: 0, y: 1 },
    LEFT:  { x: -1, y: 0 },
    RIGHT: { x: 1, y: 0 }
  };

  function isOpposite(d1, d2) { return d1.x + d2.x === 0 && d1.y + d2.y === 0; }

  function initGame() {
    snake = new Snake();
    apple = new Apple();
    apple.respawn(snake);
    direction = DIR.RIGHT;
    nextDirection = DIR.RIGHT;
    score = 0;
    scoreDisplay.textContent = '0';
    state = GameState.PLAYING;
    canvas.classList.remove('glitch');
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(update, TICK_MS);
  }

  function update() {
    if (state !== GameState.PLAYING) return;

    direction = nextDirection;
    const head = snake.move(direction);

    if (snake.collidesWall(head) || snake.collidesSelf()) {
      gameOver();
      return;
    }

    if (head.x === apple.position.x && head.y === apple.position.y) {
      snake.grow();
      score++;
      scoreDisplay.textContent = score;
      // Animated score bump
      scoreDisplay.classList.add('bump');
      clearTimeout(scoreBumpTimeout);
      scoreBumpTimeout = setTimeout(() => scoreDisplay.classList.remove('bump'), 200);
      apple.respawn(snake);
    }

    draw();
  }

  function gameOver() {
    state = GameState.GAME_OVER;
    clearInterval(gameLoop);
    canvas.classList.add('glitch');
    draw();
    setTimeout(() => canvas.classList.remove('glitch'), 500);
  }

  function restartGame() {
    if (gameLoop) clearInterval(gameLoop);
    initGame();
    draw();
  }

  function drawStars() {
    stars.forEach(s => {
      s.y += s.speed;
      if (s.y > 400) { s.y = -2; s.x = Math.random()*400; }
      ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.sin(Date.now()*0.001 + s.x)*0.2})`;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
    });
  }

  function draw() {
    ctx.clearRect(0, 0, 400, 400);

    // Deep space background
    const grad = ctx.createRadialGradient(200, 200, 50, 200, 200, 300);
    grad.addColorStop(0, '#111827'); grad.addColorStop(1, '#060a12');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 400, 400);

    // Stars
    drawStars();

    // Grid
    ctx.strokeStyle = 'rgba(0,255,65,0.04)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * GRID, 0); ctx.lineTo(i * GRID, 400); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * GRID); ctx.lineTo(400, i * GRID); ctx.stroke();
    }

    // Apple (skip if not initialized yet)
    if (apple && apple.position) {
      const ax = apple.position.x * GRID + GRID/2, ay = apple.position.y * GRID + GRID/2;
      ctx.shadowColor = '#ff0040'; ctx.shadowBlur = 20;
      // Apple gradient
      const appleGrad = ctx.createRadialGradient(ax-3, ay-3, 2, ax, ay, 10);
      appleGrad.addColorStop(0, '#ff4466'); appleGrad.addColorStop(0.5, '#ff0040'); appleGrad.addColorStop(1, '#aa0022');
      ctx.fillStyle = appleGrad;
      ctx.beginPath(); ctx.arc(ax, ay, 8, 0, Math.PI * 2); ctx.fill();
      // Highlight/shine
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath(); ctx.arc(ax-3, ay-3, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Snake
    if (snake && snake.segments) snake.segments.forEach((seg, i) => {
        const isHead = i === 0;
        const t = i / snake.segments.length; // 0=head, 1=tail
        ctx.shadowColor = '#00ff41';
        ctx.shadowBlur = isHead ? 22 : 10;
        // Gradient: bright green at head, dark green at tail
        const r = Math.round(0 + t * 0);
        const g = Math.round(255 - t * 120);
        const b = Math.round(65 - t * 40);
        ctx.fillStyle = isHead ? '#00ff41' : `rgb(${r},${g},${b})`;
        const pad = isHead ? 0 : 2;
        ctx.fillRect(seg.x * GRID + pad, seg.y * GRID + pad, GRID - pad*2, GRID - pad*2);

        // Eyes on head
        if (isHead) {
          ctx.fillStyle = 'white';
          ctx.shadowBlur = 5;
          ctx.shadowColor = '#00ff41';
          // Determine eye positions based on direction
          let ex1, ey1, ex2, ey2;
          if (direction === DIR.RIGHT) {
            ex1 = seg.x*GRID + 14; ey1 = seg.y*GRID + 5; ex2 = seg.x*GRID + 14; ey2 = seg.y*GRID + 13;
          } else if (direction === DIR.LEFT) {
            ex1 = seg.x*GRID + 6; ey1 = seg.y*GRID + 5; ex2 = seg.x*GRID + 6; ey2 = seg.y*GRID + 13;
          } else if (direction === DIR.UP) {
            ex1 = seg.x*GRID + 5; ey1 = seg.y*GRID + 6; ex2 = seg.x*GRID + 13; ey2 = seg.y*GRID + 6;
          } else {
            ex1 = seg.x*GRID + 5; ey1 = seg.y*GRID + 14; ex2 = seg.x*GRID + 13; ey2 = seg.y*GRID + 14;
          }
          ctx.beginPath(); ctx.arc(ex1, ey1, 2, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2, ey2, 2, 0, Math.PI*2); ctx.fill();
          ctx.shadowBlur = 0;
        }
      });
    ctx.shadowBlur = 0;

    // Overlay
    if (state === GameState.GAME_OVER) {
      // Scanline effect
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, 400, 400);
      for (let sy = 0; sy < 400; sy += 4) {
        ctx.fillStyle = `rgba(0,255,65,${0.02 + Math.sin(sy*0.3)*0.01})`;
        ctx.fillRect(0, sy, 400, 1);
      }

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      ctx.shadowColor = '#ff0040'; ctx.shadowBlur = 40;
      ctx.fillStyle = '#ff0040';
      ctx.font = 'bold 30px Orbitron, "Courier New", monospace';
      ctx.fillText('GAME OVER', 200, 160);

      ctx.shadowColor = '#00ff41'; ctx.shadowBlur = 20;
      ctx.fillStyle = '#00ff41';
      ctx.font = '15px Orbitron, "Courier New", monospace';
      ctx.fillText('▶ RESTART', 200, 240);
      ctx.shadowBlur = 0;

      ctx.fillStyle = 'rgba(0,255,65,0.3)';
      ctx.font = '11px Orbitron, "Courier New", monospace';
      ctx.fillText('press ENTER or click', 200, 280);
    }

    if (state === GameState.MENU) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, 400, 400);

      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = '#00ff41'; ctx.shadowBlur = 40;
      ctx.fillStyle = '#00ff41';
      ctx.font = 'bold 38px Orbitron, "Courier New", monospace';
      ctx.fillText('SNAKE', 200, 165);
      ctx.shadowBlur = 0;

      ctx.fillStyle = 'rgba(0,255,65,0.45)';
      ctx.font = '12px Orbitron, "Courier New", monospace';
      ctx.fillText('press ENTER to start', 200, 230);
    }
  }

  function handleKeydown(e) {
    const key = e.key;
    e.preventDefault();

    if (key === 'Enter') {
      if (state === GameState.MENU) { initGame(); return; }
      if (state === GameState.GAME_OVER) { restartGame(); return; }
    }

    if (state !== GameState.PLAYING) return;

    let newDir;
    if (key === 'ArrowUp') newDir = DIR.UP;
    else if (key === 'ArrowDown') newDir = DIR.DOWN;
    else if (key === 'ArrowLeft') newDir = DIR.LEFT;
    else if (key === 'ArrowRight') newDir = DIR.RIGHT;
    else return;

    if (!isOpposite(newDir, direction)) nextDirection = newDir;
  }

  // Events
  document.addEventListener('keydown', handleKeydown);
  canvas.addEventListener('click', (e) => {
    if (state === GameState.MENU) { initGame(); }
    else if (state === GameState.GAME_OVER) { restartGame(); }
  });

  // Initial draw
  draw();
</script>
</body>
</html>
